<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>THREADMILL 貼文排程</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f6f6f7;
    --bg3: #ececef;
    --text: #111111;
    --text2: #5c5c63;
    --text3: #9b9ba3;
    --border: rgba(0, 0, 0, 0.09);
    --border2: rgba(0, 0, 0, 0.16);
    --accent: #111111;
    --accent-fg: #ffffff;
    --warn: #d97706;
    --danger: #dc2626;
    --success: #16a34a;
    --radius: 14px;
    --radius-sm: 10px;
    --radius-pill: 999px;
    --shadow: 0 8px 32px rgba(17, 17, 17, 0.08);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #101114;
      --bg2: #18191d;
      --bg3: #23252b;
      --text: #f1f3f5;
      --text2: #b4b8bf;
      --text3: #7c828d;
      --border: rgba(255, 255, 255, 0.08);
      --border2: rgba(255, 255, 255, 0.14);
      --accent: #f3f4f6;
      --accent-fg: #101114;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.32);
    }
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 15px;
  }

  body {
    max-width: 480px;
    margin: 0 auto;
  }

  button,
  input,
  select,
  textarea {
    font: inherit;
  }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 16px 12px;
    border-bottom: 0.5px solid var(--border);
    background: color-mix(in srgb, var(--bg) 90%, transparent);
    backdrop-filter: blur(14px);
  }

  .topbar-title {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-write {
    border: none;
    border-radius: var(--radius-pill);
    padding: 8px 18px;
    background: var(--accent);
    color: var(--accent-fg);
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
  }

  .btn-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    border: none;
    border-radius: 50%;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
  }

  .search-wrap,
  .filter-wrap {
    padding: 10px 16px;
    border-bottom: 0.5px solid var(--border);
  }

  .search-input {
    width: 100%;
    border: none;
    border-radius: var(--radius-sm);
    background: var(--bg2);
    color: var(--text);
    padding: 10px 12px;
    outline: none;
  }

  .search-input::placeholder,
  .tag-add-input::placeholder,
  .seg-ta::placeholder {
    color: var(--text3);
  }

  .filter-wrap {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .filter-wrap::-webkit-scrollbar {
    display: none;
  }

  .ftag {
    flex-shrink: 0;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-pill);
    padding: 6px 14px;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-size: 13px;
  }

  .ftag.active {
    background: var(--accent);
    color: var(--accent-fg);
    border-color: var(--accent);
  }

  .loading,
  .empty {
    padding: 64px 20px;
    text-align: center;
    color: var(--text3);
    line-height: 1.8;
  }

  .spinner {
    width: 24px;
    height: 24px;
    margin: 0 auto 12px;
    border: 2px solid var(--border2);
    border-top-color: var(--text2);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .post-item {
    padding: 15px 16px;
    border-bottom: 0.5px solid var(--border);
  }

  .post-row {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .avatar,
  .composer-avatar {
    flex-shrink: 0;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--accent-fg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
  }

  .post-body,
  .composer-right {
    flex: 1;
    min-width: 0;
  }

  .post-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 6px;
  }

  .post-username,
  .composer-name {
    font-size: 14px;
    font-weight: 700;
  }

  .post-right {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .post-tag-pill {
    background: var(--bg3);
    color: var(--text2);
    font-size: 11px;
    border-radius: var(--radius-pill);
    padding: 2px 8px;
  }

  .post-date,
  .post-stats {
    color: var(--text3);
    font-size: 12px;
  }

  .post-content {
    margin: 6px 0 10px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .seg-gap {
    display: block;
    height: 10px;
  }

  .copy-row,
  .post-actions,
  .footer-left {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .copy-btn,
  .act-btn,
  .sheet-cancel,
  .add-seg-btn,
  .tag-mgr-del,
  .seg-del {
    border: none;
    background: none;
    color: var(--text2);
    cursor: pointer;
  }

  .copy-btn {
    border: 0.5px solid var(--border2);
    background: var(--bg2);
    border-radius: var(--radius-pill);
    padding: 8px 14px;
    font-size: 13px;
    min-height: 36px;
  }

  .copy-btn.done {
    color: var(--success);
    border-color: var(--success);
  }

  .act-btn {
    padding: 0;
    font-size: 12px;
    color: var(--text3);
  }

  .act-btn:hover {
    color: var(--text);
  }

  .toast {
    position: fixed;
    left: 50%;
    bottom: 28px;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: var(--bg);
    padding: 10px 18px;
    border-radius: var(--radius-pill);
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.2s ease;
    z-index: 200;
    white-space: nowrap;
    box-shadow: var(--shadow);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0, 0, 0, 0.48);
    align-items: flex-end;
    justify-content: center;
  }

  .overlay.open {
    display: flex;
  }

  .sheet {
    width: 100%;
    max-width: 620px;
    height: min(96vh, 920px);
    max-height: 96vh;
    display: flex;
    flex-direction: column;
    border-radius: 22px 22px 0 0;
    background: var(--bg);
    box-shadow: var(--shadow);
  }

  .sheet-handle {
    width: 36px;
    height: 4px;
    margin: 12px auto 0;
    border-radius: 999px;
    background: var(--border2);
  }

  .sheet-header,
  .sheet-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 12px 16px;
    flex-shrink: 0;
  }

  .sheet-header {
    padding-bottom: 8px;
  }

  .sheet-footer {
    border-top: 0.5px solid var(--border);
  }

  .sheet-title {
    font-size: 15px;
    font-weight: 700;
  }

  .sheet-save,
  .tag-add-btn {
    border: none;
    border-radius: var(--radius-pill);
    background: var(--accent);
    color: var(--accent-fg);
    cursor: pointer;
  }

  .sheet-save {
    padding: 8px 18px;
    font-size: 14px;
    font-weight: 600;
  }

  .sheet-save:disabled {
    opacity: 0.7;
    cursor: default;
  }

  .sheet-body {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px 20px;
  }

  .composer-row {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .composer-avatar {
    margin-top: 2px;
  }

  .composer-name {
    margin-bottom: 8px;
  }

  .seg-block {
    position: relative;
    margin-bottom: 6px;
  }

  .seg-ta {
    width: 100%;
    min-height: 140px;
    border: none;
    background: transparent;
    color: var(--text);
    line-height: 1.6;
    resize: none;
    outline: none;
  }

  .seg-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .seg-count,
  .total-count,
  .conn-label {
    font-size: 12px;
    color: var(--text3);
  }

  .seg-count.warn,
  .total-count.warn {
    color: var(--warn);
  }

  .seg-count.over {
    color: var(--danger);
  }

  .seg-del {
    font-size: 20px;
    line-height: 1;
  }

  .connector,
  .add-seg {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 8px;
  }

  .conn-line-wrap,
  .add-seg-line {
    width: 38px;
    display: flex;
    justify-content: center;
    flex-shrink: 0;
  }

  .conn-line {
    width: 2px;
    height: 16px;
    background: var(--border2);
  }

  .add-seg-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
  }

  .meta-sel,
  .meta-date,
  .tag-add-input {
    border: 0.5px solid var(--border2);
    background: var(--bg2);
    color: var(--text);
    outline: none;
  }

  .meta-sel,
  .meta-date {
    border-radius: var(--radius-pill);
    padding: 6px 12px;
    font-size: 13px;
  }

  .tag-mgr-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 0.5px solid var(--border);
  }

  .tag-mgr-name {
    font-size: 15px;
  }

  .tag-add-row {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }

  .tag-add-input {
    flex: 1;
    border-radius: var(--radius-sm);
    padding: 10px 12px;
  }

  .tag-add-btn {
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="topbar">
  <span class="topbar-title">THREADMILL 貼文排程</span>
  <div class="topbar-right">
    <button class="btn-icon" onclick="openTagMgr()" title="管理分類" aria-label="管理分類">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M4 6h16M4 12h16M4 18h7"></path>
      </svg>
    </button>
    <button class="btn-write" onclick="openComposer()">新增貼文</button>
  </div>
</div>

<div class="search-wrap">
  <input class="search-input" type="text" placeholder="搜尋貼文內容或分類..." id="search" oninput="renderPosts()">
</div>

<div class="filter-wrap" id="filter-bar"></div>

<div id="post-list">
  <div class="loading">
    <div class="spinner"></div>
    正在載入資料...
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="overlay" id="composer-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <button class="sheet-cancel" onclick="closeComposer()">取消</button>
      <span class="sheet-title" id="composer-title">新增貼文</span>
      <button class="sheet-save" onclick="savePost()" id="save-btn">儲存</button>
    </div>
    <div class="sheet-body">
      <div class="composer-row">
        <div class="composer-avatar" id="composer-avatar">U</div>
        <div class="composer-right">
          <div class="composer-name" id="composer-name">使用者</div>
          <div id="segs-container"></div>
          <div class="add-seg">
            <div class="add-seg-line">
              <div style="width:2px;height:16px;background:var(--border2);"></div>
            </div>
            <button class="add-seg-btn" onclick="addSeg()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="16"></line>
                <line x1="8" y1="12" x2="16" y2="12"></line>
              </svg>
              新增段落
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="sheet-footer">
      <div class="footer-left">
        <select class="meta-sel" id="c-tag"></select>
        <input type="date" class="meta-date" id="c-date">
      </div>
      <span class="total-count" id="total-count">共 0 字</span>
    </div>
  </div>
</div>

<div class="overlay" id="tag-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <button class="sheet-cancel" onclick="closeTagMgr()">關閉</button>
      <span class="sheet-title">管理分類</span>
      <div style="width:48px;"></div>
    </div>
    <div class="sheet-body" id="tag-mgr-body"></div>
  </div>
</div>
<script>

const DEFAULT_TAGS = ["靈感", "行銷", "創作", "THREADMILL"];
const LOCAL_POSTS_KEY = "threadmill_posts_cache";
const LOCAL_TAGS_KEY = "threadmill_tags_cache";
const APPS_SCRIPT_URL = window.APPS_SCRIPT_URL || "https://script.google.com/macros/s/AKfycby_LHMafnDbpOykpE5jJL3u-PiyZBxkdo4LHdTSNLGYTL7YHB2fCzMtlinkE2fBfCDx/exec";
DEFAULT_TAGS.splice(0, DEFAULT_TAGS.length, "靈感", "行銷", "創作", "THREADMILL");
const SEGMENT_SEPARATOR = "\n[[THREADMILL_SEGMENT]]\n";

const safeJsonParse = (raw, fallback) => {
  try {
    return JSON.parse(raw);
  } catch {
    return fallback;
  }
};

const storedName = localStorage.getItem("username");
const USERNAME = storedName && storedName.trim() ? storedName.trim() : "使用者";

let posts = [];
let tags = safeJsonParse(localStorage.getItem(LOCAL_TAGS_KEY), DEFAULT_TAGS);
if (!Array.isArray(tags) || !tags.length) {
  tags = [...DEFAULT_TAGS];
}

let activeFilter = "";
let editId = null;
let draftSegs = [""];
let cloudReady = false;

function normalizeTag(value) {
  return String(value ?? "").trim();
}

function normalizePost(post) {
  return {
    id: String(post?.id ?? Date.now()),
    content: String(post?.content ?? "").trim(),
    tag: normalizeTag(post?.tag),
    schedDate: String(post?.schedDate ?? ""),
    createdDate: String(post?.createdDate ?? ""),
    updatedAt: post?.updatedAt ?? null
  };
}

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function segsOf(content) {
  const raw = String(content || "");
  if (!raw.trim()) {
    return [];
  }
  if (raw.includes(SEGMENT_SEPARATOR)) {
    return raw
      .split(SEGMENT_SEPARATOR)
      .map((segment) => segment.trim())
      .filter(Boolean);
  }
  return [raw.trim()];
}

function totalChars(segs) {
  return segs.reduce((sum, seg) => sum + seg.length, 0);
}

function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => {
    toast.classList.remove("show");
  }, 2000);
}

function copyText(text, btn) {
  const markCopied = () => {
    const originalText = btn.textContent;
    btn.textContent = "已複製";
    btn.classList.add("done");
    setTimeout(() => {
      btn.textContent = originalText;
      btn.classList.remove("done");
    }, 1500);
  };

  const fallbackCopy = () => {
    const textarea = document.createElement("textarea");
    textarea.value = text;
    textarea.setAttribute("readonly", "");
    textarea.style.position = "fixed";
    textarea.style.opacity = "0";
    textarea.style.pointerEvents = "none";
    document.body.appendChild(textarea);
    textarea.select();
    textarea.setSelectionRange(0, textarea.value.length);

    try {
      const ok = document.execCommand("copy");
      document.body.removeChild(textarea);
      if (ok) {
        markCopied();
      } else {
        showToast("複製失敗，請再試一次");
      }
    } catch (error) {
      document.body.removeChild(textarea);
      showToast("複製失敗，請再試一次");
    }
  };

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(markCopied).catch(fallbackCopy);
  } else {
    fallbackCopy();
  }
}

function cachePosts() {
  localStorage.setItem(LOCAL_POSTS_KEY, JSON.stringify(posts));
}

function cacheTags() {
  localStorage.setItem(LOCAL_TAGS_KEY, JSON.stringify(tags));
}

function sortPosts(items) {
  return [...items].sort((a, b) => {
    const bySched = String(b.schedDate || "").localeCompare(String(a.schedDate || ""));
    if (bySched !== 0) {
      return bySched;
    }
    return String(b.createdDate || "").localeCompare(String(a.createdDate || ""));
  });
}

function bootstrapCloud() {
  cloudReady = Boolean(String(APPS_SCRIPT_URL || "").trim());
}

async function apiFetch(params = {}) {
  const url = new URL(APPS_SCRIPT_URL);
  Object.entries(params).forEach(([key, value]) => {
    if (value !== undefined && value !== null && value !== "") {
      url.searchParams.set(key, value);
    }
  });
  const response = await fetch(url.toString());
  if (!response.ok) {
    throw new Error("Apps Script GET failed");
  }
  return response.json();
}

async function apiPost(payload) {
  const response = await fetch(APPS_SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  });
  if (!response.ok) {
    throw new Error("Apps Script POST failed");
  }
  return response.json();
}

async function loadPostsFromCloud() {
  const data = await apiFetch({ action: "getPosts" });
  return sortPosts((Array.isArray(data) ? data : []).map(normalizePost));
}

async function loadTagsFromCloud() {
  const data = await apiFetch({ action: "getTags" });
  return [...new Set((Array.isArray(data) ? data : DEFAULT_TAGS).map(normalizeTag).filter(Boolean))];
}

async function writePostToCloud(post) {
  await apiPost({ action: "savePost", post });
}

async function deletePostFromCloud(id) {
  await apiPost({ action: "deletePost", id });
}

async function writeTagsToCloud(nextTags) {
  await apiPost({ action: "saveTags", tags: nextTags });
}

async function removeTagFromCloud(tagToRemove) {
  await apiPost({ action: "removeTagFromPosts", tag: normalizeTag(tagToRemove) });
}

function renderFilter() {
  const showTags = ["全部", ...new Set(tags.map(normalizeTag).filter(Boolean))];
  document.getElementById("filter-bar").innerHTML = showTags.map((tag) => {
    const value = tag === "全部" ? "" : tag;
    return `<button class="ftag ${activeFilter === value ? "active" : ""}" onclick='setFilter(${JSON.stringify(value)})'>${escapeHtml(tag)}</button>`;
  }).join("");
}

function setFilter(tag) {
  activeFilter = normalizeTag(tag);
  renderFilter();
  renderPosts();
}

function renderPosts() {
  const query = document.getElementById("search").value.trim().toLowerCase();
  const filtered = posts.filter((post) => {
    const postTag = normalizeTag(post.tag);
    const matchTag = !activeFilter || postTag === activeFilter;
    const searchTarget = `${post.content || ""} ${postTag}`.toLowerCase();
    const matchQuery = !query || searchTarget.includes(query);
    return matchTag && matchQuery;
  });

  const list = document.getElementById("post-list");
  if (!filtered.length) {
    list.innerHTML = '<div class="empty">目前沒有符合條件的貼文。<br>試著放寬搜尋或新增一篇貼文。</div>';
    return;
  }

  list.innerHTML = filtered.map((post) => {
    const segs = segsOf(post.content);
    const total = totalChars(segs);
    const dateLabel = post.schedDate ? `排程 ${post.schedDate}` : (post.createdDate || "");
    const contentHtml = segs.map((seg, index) => {
      const gap = index < segs.length - 1 ? '<span class="seg-gap"></span>' : "";
      return `<span>${escapeHtml(seg)}</span>${gap}`;
    }).join("");
    const copyButtons = segs.length > 1
      ? [
          ...segs.map((seg, index) => `<button class="copy-btn" type="button" data-copy="${escapeHtml(seg)}">複製段落 ${index + 1}</button>`),
          `<button class="copy-btn" type="button" data-copy="${escapeHtml(segs.join("\n\n"))}">複製全文</button>`
        ].join("")
      : `<button class="copy-btn" type="button" data-copy="${escapeHtml(post.content || "")}">複製內容</button>`;

    return `<div class="post-item">
      <div class="post-row">
        <div class="avatar">${escapeHtml(USERNAME.slice(0, 1).toUpperCase())}</div>
        <div class="post-body">
          <div class="post-top">
            <span class="post-username">${escapeHtml(USERNAME)}</span>
            <div class="post-right">
              ${normalizeTag(post.tag) ? `<span class="post-tag-pill">${escapeHtml(normalizeTag(post.tag))}</span>` : ""}
              <span class="post-date">${escapeHtml(dateLabel)}</span>
            </div>
          </div>
          <div class="post-content">${contentHtml}</div>
          <div class="post-stats">${total} 字，共 ${segs.length} 段</div>
          <div class="copy-row">${copyButtons}</div>
          <div class="post-actions">
            <button class="act-btn" onclick='openComposer(${JSON.stringify(post.id)})'>編輯</button>
            <button class="act-btn" onclick='deletePost(${JSON.stringify(post.id)})'>刪除</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join("");
}

async function loadAll() {
  try {
    if (cloudReady) {
      const [postsData, tagsData] = await Promise.all([
        loadPostsFromCloud(),
        loadTagsFromCloud()
      ]);
      posts = postsData;
      tags = tagsData;
      cachePosts();
      cacheTags();
    } else {
      posts = sortPosts(safeJsonParse(localStorage.getItem(LOCAL_POSTS_KEY), []).map(normalizePost));
      tags = [...new Set(safeJsonParse(localStorage.getItem(LOCAL_TAGS_KEY), DEFAULT_TAGS).map(normalizeTag).filter(Boolean))];
      if (!tags.length) {
        tags = [...DEFAULT_TAGS];
      }
      showToast("尚未設定 Apps Script，現在先使用本機暫存");
    }
  } catch (error) {
    posts = sortPosts(safeJsonParse(localStorage.getItem(LOCAL_POSTS_KEY), []).map(normalizePost));
    tags = [...new Set(safeJsonParse(localStorage.getItem(LOCAL_TAGS_KEY), DEFAULT_TAGS).map(normalizeTag).filter(Boolean))];
    if (!tags.length) {
      tags = [...DEFAULT_TAGS];
    }
    showToast("Apps Script 連線失敗，已改用本機暫存");
  }

  renderIdentity();
  renderFilter();
  renderPosts();
}

async function saveTags() {
  cacheTags();
  if (!cloudReady) {
    return;
  }

  try {
    await writeTagsToCloud(tags);
  } catch (error) {
    showToast("分類已存在本機，但雲端同步失敗");
  }
}

async function deletePost(id) {
  if (!confirm("確定要刪除這篇貼文嗎？")) {
    return;
  }

  const previousPosts = [...posts];
  posts = posts.filter((item) => item.id !== id);
  cachePosts();
  renderFilter();
  renderPosts();

  if (!cloudReady) {
    showToast("貼文已刪除並儲存在本機");
    return;
  }

  try {
    await deletePostFromCloud(id);
    showToast("貼文已刪除");
  } catch (error) {
    posts = previousPosts;
    cachePosts();
    renderFilter();
    renderPosts();
    showToast("雲端刪除失敗，已還原畫面");
  }
}

function renderIdentity() {
  document.getElementById("composer-avatar").textContent = USERNAME.slice(0, 1).toUpperCase();
  document.getElementById("composer-name").textContent = USERNAME;
}

function openComposer(id) {
  editId = id || null;
  if (editId) {
    const post = posts.find((item) => item.id === editId);
    draftSegs = post ? segsOf(post.content) : [""];
    if (!draftSegs.length) {
      draftSegs = [""];
    }
    document.getElementById("c-date").value = post?.schedDate || "";
    document.getElementById("composer-title").textContent = "編輯貼文";
    renderTagSelect(post?.tag || "");
  } else {
    draftSegs = [""];
    document.getElementById("c-date").value = "";
    document.getElementById("composer-title").textContent = "新增貼文";
    renderTagSelect("");
  }

  renderSegsEditor();
  document.getElementById("composer-overlay").classList.add("open");
}

function closeComposer() {
  document.getElementById("composer-overlay").classList.remove("open");
  editId = null;
}

function renderTagSelect(selected) {
  const select = document.getElementById("c-tag");
  const normalizedSelected = normalizeTag(selected);
  select.innerHTML = [
    '<option value="">未分類</option>',
    ...tags.map((tag) => `<option value="${escapeHtml(tag)}" ${tag === normalizedSelected ? "selected" : ""}>${escapeHtml(tag)}</option>`)
  ].join("");
}

function autoResize(textarea) {
  textarea.style.height = "auto";
  textarea.style.height = `${textarea.scrollHeight}px`;
}

function updateCounts() {
  const total = totalChars(draftSegs);
  const totalCount = document.getElementById("total-count");
  totalCount.className = `total-count${total > 2000 ? " warn" : ""}`;
  totalCount.textContent = `共 ${total} 字`;

  document.querySelectorAll("#segs-container .seg-block").forEach((block, index) => {
    const counter = block.querySelector(".seg-count");
    const length = (draftSegs[index] || "").length;
    counter.className = `seg-count${length > 500 ? " over" : length > 450 ? " warn" : ""}`;
    counter.textContent = `${length} / 500`;
  });
}

function renderSegsEditor() {
  const container = document.getElementById("segs-container");
  container.innerHTML = "";

  draftSegs.forEach((seg, index) => {
    if (index > 0) {
      const connector = document.createElement("div");
      connector.className = "connector";
      connector.innerHTML = '<div class="conn-line-wrap"><div class="conn-line"></div></div><span class="conn-label">下一段</span>';
      container.appendChild(connector);
    }

    const block = document.createElement("div");
    block.className = "seg-block";

    const textarea = document.createElement("textarea");
    textarea.className = "seg-ta";
    textarea.rows = 3;
    textarea.value = seg;
    textarea.placeholder = index === 0 ? "輸入第一段內容..." : "輸入下一段內容...";
    textarea.oninput = function () {
      draftSegs[index] = this.value;
      autoResize(this);
      updateCounts();
    };
    block.appendChild(textarea);

    const footer = document.createElement("div");
    footer.className = "seg-footer";

    const counter = document.createElement("span");
    counter.className = "seg-count";
    footer.appendChild(counter);

    if (index > 0) {
      const removeButton = document.createElement("button");
      removeButton.className = "seg-del";
      removeButton.textContent = "×";
      removeButton.onclick = () => {
        draftSegs.splice(index, 1);
        renderSegsEditor();
      };
      footer.appendChild(removeButton);
    }

    block.appendChild(footer);
    container.appendChild(block);

    setTimeout(() => autoResize(textarea), 10);
  });

  updateCounts();
}

function addSeg() {
  draftSegs.push("");
  renderSegsEditor();
}

async function savePost() {
  const segs = draftSegs.map((seg) => seg.trim()).filter(Boolean);
  if (!segs.length) {
    showToast("請先輸入內容再儲存");
    return;
  }

  const saveButton = document.getElementById("save-btn");
  saveButton.textContent = "儲存中...";
  saveButton.disabled = true;

  const now = new Date().toLocaleDateString("zh-TW");
  const currentPost = editId ? posts.find((item) => item.id === editId) : null;
  const post = normalizePost({
    id: editId || Date.now().toString(),
    content: segs.join(SEGMENT_SEPARATOR),
    tag: document.getElementById("c-tag").value,
    schedDate: document.getElementById("c-date").value,
    createdDate: currentPost?.createdDate || now
  });

  const previousPosts = [...posts];
  if (editId) {
    const index = posts.findIndex((item) => item.id === editId);
    if (index >= 0) {
      posts[index] = post;
    }
  } else {
    posts.unshift(post);
  }
  posts = sortPosts(posts);
  cachePosts();

  renderFilter();
  renderPosts();
  closeComposer();

  if (!cloudReady) {
    showToast("貼文已儲存在本機，設定 Apps Script 後就會雲端同步");
    saveButton.textContent = "儲存";
    saveButton.disabled = false;
    return;
  }

  try {
    await writePostToCloud(post);
    showToast("貼文已同步到 Google Sheets");
  } catch (error) {
    posts = previousPosts;
    cachePosts();
    renderFilter();
    renderPosts();
    showToast("雲端儲存失敗，已還原畫面");
  } finally {
    saveButton.textContent = "儲存";
    saveButton.disabled = false;
  }
}

function openTagMgr() {
  renderTagMgr();
  document.getElementById("tag-overlay").classList.add("open");
}

function closeTagMgr() {
  document.getElementById("tag-overlay").classList.remove("open");
}

function renderTagMgr() {
  const body = document.getElementById("tag-mgr-body");
  body.innerHTML = [
    ...tags.map((tag) => `
      <div class="tag-mgr-item">
        <span class="tag-mgr-name">${escapeHtml(tag)}</span>
        <button class="tag-mgr-del" onclick='delTag(${JSON.stringify(tag)})'>刪除</button>
      </div>`),
    `<div class="tag-add-row">
      <input class="tag-add-input" type="text" id="new-tag-inp" placeholder="新增一個分類...">
      <button class="tag-add-btn" onclick="addTag()">新增</button>
    </div>`
  ].join("");

  const input = document.getElementById("new-tag-inp");
  input.onkeydown = (event) => {
    if (event.key === "Enter") {
      addTag();
    }
  };
}

async function delTag(tag) {
  const normalizedTag = normalizeTag(tag);
  const previousTags = [...tags];
  const previousPosts = [...posts];

  tags = tags.filter((item) => normalizeTag(item) !== normalizedTag);
  posts = posts.map((post) => normalizeTag(post.tag) === normalizedTag ? { ...post, tag: "" } : post);
  cacheTags();
  cachePosts();
  renderTagMgr();
  renderFilter();
  renderPosts();
  renderTagSelect(document.getElementById("c-tag").value);

  if (!cloudReady) {
    showToast("分類已更新並儲存在本機");
    return;
  }

  try {
    await Promise.all([
      writeTagsToCloud(tags),
      removeTagFromCloud(normalizedTag)
    ]);
    showToast("分類已同步到 Google Sheets");
  } catch (error) {
    tags = previousTags;
    posts = previousPosts;
    cacheTags();
    cachePosts();
    renderTagMgr();
    renderFilter();
    renderPosts();
    renderTagSelect(document.getElementById("c-tag").value);
    showToast("雲端更新失敗，已還原畫面");
  }
}

async function addTag() {
  const input = document.getElementById("new-tag-inp");
  const value = normalizeTag(input.value);
  if (!value) {
    input.value = "";
    return;
  }

  if (tags.map(normalizeTag).includes(value)) {
    input.value = "";
    showToast("這個分類已經存在");
    return;
  }

  const previousTags = [...tags];
  tags.push(value);
  tags = [...new Set(tags.map(normalizeTag).filter(Boolean))];
  input.value = "";
  cacheTags();
  renderTagMgr();
  renderFilter();
  renderTagSelect(value);

  if (!cloudReady) {
    showToast(`已新增分類：${value}`);
    return;
  }

  try {
    await writeTagsToCloud(tags);
    showToast(`已新增分類：${value}`);
  } catch (error) {
    tags = previousTags;
    cacheTags();
    renderTagMgr();
    renderFilter();
    renderTagSelect(document.getElementById("c-tag").value);
    showToast("雲端新增分類失敗，已還原");
  }
}

document.getElementById("composer-overlay").addEventListener("click", (event) => {
  if (event.target === document.getElementById("composer-overlay")) {
    closeComposer();
  }
});

document.getElementById("tag-overlay").addEventListener("click", (event) => {
  if (event.target === document.getElementById("tag-overlay")) {
    closeTagMgr();
  }
});

document.addEventListener("click", (event) => {
  const button = event.target.closest(".copy-btn");
  if (!button) {
    return;
  }
  copyText(button.dataset.copy || "", button);
});

window.setFilter = setFilter;
window.copyText = copyText;
window.openComposer = openComposer;
window.closeComposer = closeComposer;
window.addSeg = addSeg;
window.savePost = savePost;
window.openTagMgr = openTagMgr;
window.closeTagMgr = closeTagMgr;
window.delTag = delTag;
window.addTag = addTag;
window.deletePost = deletePost;
window.renderPosts = renderPosts;

bootstrapCloud();
renderIdentity();
renderTagSelect("");
renderSegsEditor();
loadAll();
</script>
</body>
</html>
